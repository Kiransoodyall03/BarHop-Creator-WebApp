name: CI & Codecov

# This tells GitHub to run this script every time you push or merge to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up the Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'

    # 3. Install dependencies (safely bypassing peer conflicts)
    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    # 4. Run the ESLint checks we set up
    - name: Run Linter
      run: npm run lint

    # 5. Run the tests and generate the coverage report
    - name: Run Tests with Coverage
      run: npm run test:coverage

    # 6. Upload that report to Codecov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Kiransoodyall03/BarHop-Creator-WebApp # REPLACE THIS