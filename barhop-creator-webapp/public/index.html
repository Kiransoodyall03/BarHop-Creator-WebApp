<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the
      // wrong mode. Defaults to dark (brand default) on any failure.
      (function () {
        var dark = true;
        try {
          var t = localStorage.getItem('barhop-theme');
          if (t === 'light') dark = false;
          else if (t === 'system')
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        } catch (e) {}
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#120B14" />
    <meta
      name="description"
      content="BarHop Creator — build, publish, and manage your venue's presence on BarHop."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>BarHop Creator</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
